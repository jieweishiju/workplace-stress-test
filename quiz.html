<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场抗压能力测试 - 答题中</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body class="quiz-page">
    <div class="container">
        <header class="quiz-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">💼</span>
                    <span class="logo-text">职场抗压测试</span>
                </div>
                <div class="progress-info">
                    <span class="current-question">第 <strong id="currentNum">1</strong> / 20 题</span>
                    <span class="progress-percent"><strong id="percentNum">5</strong>%</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </header>

        <main class="quiz-main">
            <div class="dimension-badge" id="dimensionBadge">
                <span class="dimension-icon">🧠</span>
                <span class="dimension-name">情绪管理</span>
            </div>

            <div class="question-card-main" id="questionCard">
                <div class="question-number-badge" id="questionNum">Q1</div>
                <div class="scenario-container">
                    <p class="scenario-text" id="scenarioText"></p>
                </div>
                <div class="options-container" id="optionsContainer"></div>
            </div>

            <div class="quiz-nav">
                <button class="nav-btn prev-btn" id="prevBtn" disabled>
                    <span class="nav-icon">←</span>
                    <span>上一题</span>
                </button>
                <button class="nav-btn next-btn" id="nextBtn" disabled>
                    <span>下一题</span>
                    <span class="nav-icon">→</span>
                </button>
                <button class="nav-btn submit-btn" id="submitBtn" style="display: none;">
                    <span>查看结果</span>
                    <span class="nav-icon">✨</span>
                </button>
            </div>

            <div class="question-dots" id="questionDots"></div>
        </main>

        <div class="exit-modal" id="exitModal">
            <div class="modal-content">
                <h3>确定要退出测试吗？</h3>
                <p>你的答题进度将会丢失</p>
                <div class="modal-buttons">
                    <button class="modal-btn cancel" id="cancelExit">继续答题</button>
                    <button class="modal-btn confirm" id="confirmExit">退出测试</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        let questions = [];
        let currentIndex = 0;
        let answers = {};
        let startTime = Date.now();

        async function loadQuestions() {
            try {
                const response = await fetch('data/questions.json');
                const data = await response.json();
                questions = data.questions;
                initQuiz();
            } catch (error) {
                console.error('加载题目失败:', error);
                alert('加载题目失败，请刷新重试');
            }
        }

        function initQuiz() {
            renderQuestion();
            renderDots();
            updateProgress();
            bindEvents();
            setTimeout(() => {
                document.getElementById('questionCard').classList.add('animate-in');
            }, 100);
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const dimensionBadge = document.getElementById('dimensionBadge');
            const dimensionIcons = { '情绪管理': '🧠', '压力应对': '💪', '技能应对': '⚡' };
            dimensionBadge.innerHTML = '<span class="dimension-icon">' + dimensionIcons[q.dimension] + '</span><span class="dimension-name">' + q.dimension + '</span>';
            document.getElementById('questionNum').textContent = 'Q' + (currentIndex + 1);
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('scenarioText').textContent = q.scenario;
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            const optionLabels = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, index) => {
                const isSelected = answers[currentIndex] === opt.score;
                const optionEl = document.createElement('div');
                optionEl.className = 'option-item' + (isSelected ? ' selected' : '');
                optionEl.dataset.score = opt.score;
                optionEl.innerHTML = '<span class="option-label">' + optionLabels[index] + '</span><span class="option-text">' + opt.text + '</span><span class="option-check">✓</span>';
                optionEl.addEventListener('click', function() { selectOption(optionEl, opt.score); });
                optionsContainer.appendChild(optionEl);
                setTimeout(() => { optionEl.classList.add('animate-in'); }, 150 + index * 80);
            });
            updateNavButtons();
        }

        function selectOption(el, score) {
            document.querySelectorAll('.option-item').forEach(function(item) { item.classList.remove('selected'); });
            el.classList.add('selected');
            answers[currentIndex] = score;
            updateNavButtons();
            updateDot(currentIndex);
            el.classList.add('pulse');
            setTimeout(() => el.classList.remove('pulse'), 200);
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');
            prevBtn.disabled = currentIndex === 0;
            const hasAnswer = answers[currentIndex] !== undefined;
            if (currentIndex === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'flex';
                submitBtn.disabled = !hasAnswer;
            } else {
                nextBtn.style.display = 'flex';
                submitBtn.style.display = 'none';
                nextBtn.disabled = !hasAnswer;
            }
        }

        function renderDots() {
            const container = document.getElementById('questionDots');
            container.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                if (i === 0) dot.classList.add('current');
                dot.addEventListener('click', function() { goToQuestion(i); });
                container.appendChild(dot);
            }
        }

        function updateDot(index) {
            const dots = document.querySelectorAll('.dot');
            dots.forEach(function(dot, i) {
                dot.classList.remove('current', 'answered');
                if (i === index) { dot.classList.add('current'); }
                else if (answers[i] !== undefined) { dot.classList.add('answered'); }
            });
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentNum').textContent = Math.round(percent);
        }

        function goToQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            const card = document.getElementById('questionCard');
            card.classList.remove('animate-in');
            currentIndex = index;
            renderQuestion();
            updateProgress();
            const dots = document.querySelectorAll('.dot');
            dots.forEach(function(dot, i) {
                dot.classList.remove('current');
                if (i === index) dot.classList.add('current');
            });
            setTimeout(() => { card.classList.add('animate-in'); }, 50);
        }

        function bindEvents() {
            document.getElementById('prevBtn').addEventListener('click', function() { goToQuestion(currentIndex - 1); });
            document.getElementById('nextBtn').addEventListener('click', function() { goToQuestion(currentIndex + 1); });
            document.getElementById('submitBtn').addEventListener('click', submitQuiz);
            document.getElementById('confirmExit').addEventListener('click', function() { window.location.href = 'index.html'; });
            document.getElementById('cancelExit').addEventListener('click', function() { document.getElementById('exitModal').classList.remove('show'); });
            window.addEventListener('beforeunload', function(e) {
                if (Object.keys(answers).length > 0) { e.preventDefault(); e.returnValue = ''; }
            });
        }

        function submitQuiz() {
            const unanswered = [];
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] === undefined) { unanswered.push(i + 1); }
            }
            if (unanswered.length > 0) {
                alert('还有 ' + unanswered.length + ' 道题未作答');
                goToQuestion(unanswered[0] - 1);
                return;
            }
            const result = calculateResult();
            const timeSpent = Math.round((Date.now() - startTime) / 1000);
            sessionStorage.setItem('quizResult', JSON.stringify({ answers: answers, result: result, timeSpent: timeSpent }));
            window.location.href = 'result.html';
        }

        function calculateResult() {
            const dimensionScores = { '情绪管理': { total: 0, count: 0 }, '压力应对': { total: 0, count: 0 }, '技能应对': { total: 0, count: 0 } };
            questions.forEach(function(q) {
                if (answers[q.id - 1] !== undefined) {
                    dimensionScores[q.dimension].total += answers[q.id - 1];
                    dimensionScores[q.dimension].count++;
                }
            });
            const dimensions = {};
            for (const [name, data] of Object.entries(dimensionScores)) {
                dimensions[name] = Math.round((data.total / (data.count * 4)) * 100);
            }
            const totalScore = Math.round((dimensions['情绪管理'] + dimensions['压力应对'] + dimensions['技能应对']) / 3);
            let title, titleEmoji, description;
            if (totalScore >= 85) { title = '职场铜墙铁壁'; titleEmoji = '🏆'; description = '你的抗压能力堪称教科书级别！'; }
            else if (totalScore >= 70) { title = '压力太极大师'; titleEmoji = '🥋'; description = '你深谙以柔克刚之道。'; }
            else if (totalScore >= 55) { title = '弹性职场人'; titleEmoji = '🎾'; description = '你有不错的抗压基础。'; }
            else if (totalScore >= 40) { title = '需要充电的打工人'; titleEmoji = '🔋'; description = '是时候学几招抗压秘籍了！'; }
            else { title = '职场小嫩芽'; titleEmoji = '🌱'; description = '这也是成长的一部分！'; }
            return { dimensions: dimensions, totalScore: totalScore, title: title, titleEmoji: titleEmoji, description: description };
        }

        loadQuestions();
    </script>
</body>
</html>
